name: build-feeds

on:
  schedule:
    - cron: '30 11 * * 1'   # Mondays 11:30 UTC
  workflow_dispatch: {}

permissions:
  contents: read   # least privilege; the job only reads code and writes to R2

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      DUCKDB_PATH: warehouse.duckdb
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683   # v4.2.2
      - uses: actions/setup-python@0b93645e9fea7318ecaed2b359559ac225c90a2b   # v5.3.0
        with:
          python-version: '3.12'
      - run: pip install -r requirements.txt
      - run: dbt run --profiles-dir .
      - run: dbt test --profiles-dir .
        continue-on-error: true   # surface data-quality failures without blocking publish
      - run: python scripts/export_feeds.py
        env:
          R2_ENDPOINT_URL: ${{ secrets.R2_ENDPOINT_URL }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_BUCKET_NAME: ${{ secrets.R2_BUCKET_NAME }}
          R2_PUBLIC_BASE_URL: ${{ secrets.R2_PUBLIC_BASE_URL }}
