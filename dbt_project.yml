name: 'data_pipelines'
version: '1.0.0'
config-version: 2

profile: 'data_pipelines'

model-paths: ["models"]
macro-paths: ["macros"]
target-path: "target"
clean-targets: ["target", "dbt_packages"]

# Staging = thin views over the raw sources; marts = materialized tables that the
# exporter publishes. Any mart tagged `ltm_feed` is exported for Low Tech Maps.
models:
  data_pipelines:
    staging:
      +materialized: view
    marts:
      +materialized: table

vars:
  # Row cap pulled from each Socrata source (after server-side prefiltering).
  # Overrides Socrata's 1000-row default; keep it above the prefiltered row count
  # (~13k recently-opened businesses) so nothing is silently truncated.
  max_rows: 50000
  # Pull new business locations opened within this many months...
  business_open_lookback_months: 12
  # ...and inspections over the same window, so each business's true first
  # inspection is captured (an inspection can't predate the opening).
  inspection_lookback_months: 12
  # Headline filter (applied in the mart): keep only businesses whose FIRST
  # inspection landed within this many days — i.e. just confirmed open.
  first_inspection_window_days: 30
