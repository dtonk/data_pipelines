version: 2

models:
  - name: open_restaurants
    description: >
      Recently-opened SF food businesses confirmed actually open by their first
      health inspection. Tagged `ltm_feed` → exported to JSON for Low Tech Maps.
    columns:
      - name: id
        description: "Registry uniqueid — used as the feed's upsert key."
        tests: [not_null, unique]
      - name: name
        tests: [not_null]
      - name: lat
        tests: [not_null]
      - name: lng
        tests: [not_null]
